name: Build and Save Docker Image

on:
  push:
    branches:
      - master

jobs:
  build-and-store:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t hardinventory-docker-image:latest .

    - name: Save Docker image as artifact
      run: docker save hardinventory-docker-image:latest -o hardinventory-docker-image.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: hardinventory-docker-image.tar
